<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Deck of Cards</title>
</head>


<body>
    <header>
        <h1>Deck of Cards Game</h1>
        <div id="headerDisplay">
            <div class="numberOfPlayers">
                <p>Number of players</p>

                <button class="subtract">-</button>
                <input type="number" id="playersDisplay" placeholder=0 readonly>
                <button class="add">+</button>
            </div>
            <div class="numberOfPlayers">
                <p>Cards per player</p>

                <button class="subtract">-</button>
                <input type="number" id="numOfCardsPerPlayerDisplay" placeholder=0 readonly>
                <button class="add">+</button>
            </div>
            <div class="remainingCards">
                <p>Remaining Cards</p>
                <input type="number" id="remainingCardsdisplay" placeholder=0 readonly>
            </div>
        </div>
    </header>

    <div class="buttonWrapper">
        <Div id="resetGame">
            <button id="reset">Clear All</button>
        </Div>
        <div><button id="buildTheDeck">Create Deck</button></div>
        <Div id="dealGame">
            <button id="deal">Deal</button>
        </Div>
    </div>
    <script type="module" src="./script.js"></script>
</body>

</html>
